sonar.projectKey=hueknowkathh_Alumni_Frontend
sonar.organization=hueknowkathh
sonar.projectName=Alumni_Frontend

# Flutter/Dart source and test locations
sonar.sources=lib
sonar.tests=test
sonar.test.inclusions=test/**/*.dart

# Exclude generated files and non-Dart app shells from analysis noise
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,**/generated_plugin_registrant.dart,**/.dart_tool/**,**/build/**,android/**,ios/**,linux/**,macos/**,web/**,windows/**

# Import Flutter coverage generated by `flutter test --coverage`
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Encoding of the source code
sonar.sourceEncoding=UTF-8
